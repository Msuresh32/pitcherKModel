betting:
  apply_bias_correction: true
  bankroll: 1000
  default_residual_std:
    hits_allowed: 2.0
    strikeouts: 1.8
    walks: 1.0
  disabled_markets:
  - hits_allowed
  - walks
  edge_shrink_factor: 0.5
  main_line_max_odds: 140
  main_line_min_odds: -160
  main_line_only: true
  market_distribution:
    hits_allowed: normal
    strikeouts: poisson
    walks: poisson
  max_edge_pct: 20.0
  max_kelly_fraction: 0.05
  max_proj_gap: 0.8
  min_edge_pct: 7.0
  residual_std_multiplier: 1.25
data:
  batter_game_logs_file: data/raw/batter_game_logs.csv
  closing_odds_file: data/odds/historical_pitcher_props_plus_2026_6h.csv
  exports_dir: data/exports
  fangraphs_file: data/raw/fangraphs_pitcher_stats.csv
  game_context_logs_file: data/raw/game_context_logs.csv
  odds_dir: data/odds
  odds_file: data/odds/pitcher_props.csv
  park_factors_file: data/raw/park_factors.csv
  pitcher_logs_file: data/raw/pitcher_game_logs.csv
  probable_pitchers_file: data/raw/probable_pitchers.csv
  processed_dir: data/processed
  raw_dir: data/raw
  statcast_batter_discipline_file: data/raw/statcast_batter_discipline_daily.csv
  statcast_batter_pitch_type_daily_file: data/raw/statcast_batter_pitch_type_daily.csv
  statcast_pitcher_advanced_file: data/raw/statcast_pitcher_advanced_daily.csv
  statcast_pitcher_daily_file: data/raw/statcast_pitcher_daily.csv
  team_batting_logs_file: data/raw/team_batting_game_logs.csv
  today_lineups_file: data/raw/today_lineups.csv
export:
  csv: true
  google_sheet_name: ''
  google_sheets: false
features:
  rolling_windows:
  - 3
  - 5
  - 10
  - 20
  top_k_features: 100
training:
  backtest_end: '2026-05-31'
  backtest_start: '2026-01-01'
  cv_splits: 4
  min_history_games: 3
  model_type: ensemble
  per_target_alpha:
    hits_allowed: 0.0001
    strikeouts: 0.1
    walks: 0.01
  random_state: 42
  train_end: '2025-12-31'
  train_start: '2023-01-01'

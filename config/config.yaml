data:
  raw_dir: data/raw
  processed_dir: data/processed
  exports_dir: data/exports
  odds_dir: data/odds
  pitcher_logs_file: data/raw/pitcher_game_logs.csv
  team_batting_logs_file: data/raw/team_batting_game_logs.csv
  batter_game_logs_file: data/raw/batter_game_logs.csv
  statcast_pitcher_daily_file: data/raw/statcast_pitcher_daily.csv
  statcast_batter_pitch_type_daily_file: data/raw/statcast_batter_pitch_type_daily.csv
  park_factors_file: data/raw/park_factors.csv
  game_context_logs_file: data/raw/game_context_logs.csv
  probable_pitchers_file: data/raw/probable_pitchers.csv
  today_lineups_file: data/raw/today_lineups.csv
  odds_file: data/odds/pitcher_props.csv
  fangraphs_file: data/raw/fangraphs_pitcher_stats.csv
  statcast_pitcher_advanced_file: data/raw/statcast_pitcher_advanced_daily.csv
  statcast_batter_discipline_file: data/raw/statcast_batter_discipline_daily.csv
  closing_odds_file: data/odds/historical_pitcher_props_plus_2026_6h.csv

training:
  train_start: "2023-01-01"
  train_end: "2025-12-31"
  backtest_start: "2026-01-01"
  backtest_end: "2026-05-31"
  # ensemble = 60% Poisson GLM + 40% XGBoost Poisson blend
  model_type: ensemble
  random_state: 42
  min_history_games: 3
  cv_splits: 4
  # Per-market regularization strength for the Poisson component of the ensemble
  per_target_alpha:
    strikeouts: 0.1
    walks: 0.01
    hits_allowed: 0.0001

features:
  rolling_windows: [3, 5, 10, 20]
  # Top-K features selected by RF importance before fitting the Poisson GLM.
  # Reduces correlated/noisy features that cause overconfident edge estimates.
  # Set to null to use all features.
  top_k_features: 100

betting:
  bankroll: 1000
  max_kelly_fraction: 0.05
  # 7%+ filter: no upper cap. 7-12% = +10% ROI, 20%+ = +33.4% ROI in 2026.
  # 12-20% was -8.3% ROI (sample: 120 bets) but keeping all 7%+ per user preference.
  min_edge_pct: 7.0
  max_edge_pct: 100.0
  # Key filter: when model and market disagree by >0.8 K, the market is more right.
  # High-gap bets (>1.0) had -13.4% ROI; near-line bets had +3.9% ROI.
  max_proj_gap: 0.8
  edge_shrink_factor: 0.5
  residual_std_multiplier: 1.25
  default_residual_std:
    strikeouts: 1.8
    walks: 1.0
    hits_allowed: 2.0
  # Per-market probability distribution. hits_allowed uses Normal because
  # its variance is much higher than Poisson assumes (sequencing/defense noise).
  market_distribution:
    strikeouts: poisson
    walks: poisson
    hits_allowed: normal
  # Apply calibration bias correction to projections before computing probabilities.
  # Shifts each market's projection by its observed mean error from the backtest.
  apply_bias_correction: true
  # Skip bets early in the season before the model has enough current-year data.
  # April losses in 2026 traced to pitchers with < 5 current-season starts.
  min_starts_current_season: 5
  # Markets excluded from betting output (projection still shown for reference).
  # hits_allowed is excluded until calibration improves.
  disabled_markets:
    - hits_allowed
    - walks
  # Filter odds to near-even-money lines only (removes extreme alt lines).
  # Set main_line_only: true to activate. Lines are kept if over_odds OR
  # under_odds falls within [main_line_min_odds, main_line_max_odds].
  main_line_only: true
  main_line_min_odds: -160
  main_line_max_odds: 140

export:
  csv: true
  google_sheets: false
  google_sheet_name: ""

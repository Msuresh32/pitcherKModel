<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SVB Risk</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--black:#000;--panel:#0a0c0a;--green:#2fd44a;--green2:#16a82f;--glow:rgba(47,212,74,.35);--dim:#8a9097;--line:rgba(255,255,255,.07);--silver:#d8dde0}
body{background:var(--black);font-family:'Inter',sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* nav bar */
.nav{height:48px;background:rgba(0,0,0,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 24px;gap:0;flex-shrink:0;z-index:10}
.brand{font-family:'Oswald',sans-serif;font-weight:700;font-size:18px;letter-spacing:1px;color:var(--silver);margin-right:32px;white-space:nowrap}
.brand .v{color:var(--green)}
.tab{font-family:'Oswald',sans-serif;font-weight:500;font-size:13px;letter-spacing:1px;text-transform:uppercase;color:var(--dim);padding:0 20px;height:48px;display:flex;align-items:center;cursor:pointer;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;user-select:none;white-space:nowrap}
.tab:hover{color:var(--silver)}
.tab.active{color:var(--green);border-bottom-color:var(--green)}
.spacer{flex:1}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--glow);animation:pulse 2s ease-in-out infinite}
.live-label{font-size:12px;color:var(--dim);letter-spacing:.5px;margin-left:8px}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 8px var(--glow)}50%{opacity:.5;box-shadow:0 0 3px var(--glow)}}

/* iframe container */
.frames{flex:1;position:relative;overflow:hidden}
iframe{position:absolute;inset:0;width:100%;height:100%;border:none;opacity:0;pointer-events:none;transition:opacity .2s}
iframe.active{opacity:1;pointer-events:all}
</style>
</head>
<body>

<div class="nav">
  <div class="brand">S<span class="v">V</span>B RISK</div>
  <div class="tab active" data-tab="0">Home</div>
  <div class="tab" data-tab="1">K Model</div>
  <div class="tab" data-tab="2">Live Picks</div>
  <div class="spacer"></div>
  <div class="live-dot"></div>
  <div class="live-label">LIVE</div>
</div>

<div class="frames">
  <iframe id="f0" src="home.html" class="active"></iframe>
  <iframe id="f1" src="model.html"></iframe>
  <iframe id="f2" src="picks.html"></iframe>
</div>

<script>
var tabs = document.querySelectorAll('.tab');
var frames = document.querySelectorAll('iframe');
tabs.forEach(function(t){
  t.addEventListener('click', function(){
    var i = +this.dataset.tab;
    tabs.forEach(function(x){x.classList.remove('active');});
    frames.forEach(function(x){x.classList.remove('active');});
    this.classList.add('active');
    document.getElementById('f'+i).classList.add('active');
  });
});
</script>
</body>
</html>
